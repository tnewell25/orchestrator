[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "echo '[boot] PORT='$PORT && python -c 'import orchestrator.main; print(\"[boot] imports OK\", flush=True)' && exec uvicorn orchestrator.main:app --host 0.0.0.0 --port ${PORT:-8000} --log-level info"
healthcheckPath = "/health"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
